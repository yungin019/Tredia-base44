workflows:
  ios-workflow:
    name: TREDIO iOS
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tredio.app
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive archive CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER="TREDIO App Store" DEVELOPMENT_TEAM=78GKEP7L2H
    artifacts:
      - build/App.xcarchive
    publishing:
      app_store_connect:
        submit_to_testflight: true
